<h1>Consulta Declaración de Renta</h1>

<p class="subtitulo">

Ingrese los dos últimos dígitos de su cédula para conocer la fecha límite de presentación.

</p>

<label>

Últimos dos dígitos

</label>

<input
id="digitos"
type="text"
maxlength="2"
placeholder="Ej: 05"
autocomplete="off">

<button id="consultarBtn">

🔍 Consultar

</button>

<button id="limpiarBtn">

🧹 Nueva consulta

</button>

<div id="resultado"></div>

<div style="margin-top:20px; text-align:center;">



</div>

<div class="footer">

Consulta informativa • Declaración de Renta Personas Naturales • 2026

</div>

</div>

<script>

const SANCION_MINIMA=524000;

function formatearFecha(fechaISO){

    const fecha=new Date(fechaISO+"T00:00:00");

    return fecha.toLocaleDateString("es-CO",{
        weekday:"long",
        year:"numeric",
        month:"long",
        day:"numeric"
    });

}

function calcularDias(fechaISO){

    const hoy=new Date();

    hoy.setHours(0,0,0,0);

    const fecha=new Date(fechaISO+"T00:00:00");

    const diferencia=fecha-hoy;

    return Math.ceil(diferencia/86400000);

}

function colorDias(dias){

    if(dias>30){

        return "#2e7d32";

    }

    if(dias>10){

        return "#ef6c00";

    }

    return "#c62828";

}

function consultar(){

    const digitos=document.getElementById("digitos").value.trim();

    const resultado=document.getElementById("resultado");

    resultado.style.display="block";

    if(!/^[0-9]{2}$/.test(digitos)){

        resultado.innerHTML=`
            <div class="error">
            Debe ingresar exactamente dos dígitos.
            </div>
        `;

        return;

    }

    const fechaLimite=fechasVencimiento[digitos];

    if(!fechaLimite){

        resultado.innerHTML=`
            <div class="error">
            No existe información para esos dígitos.
            </div>
        `;

        return;

    }

    const dias=calcularDias(fechaLimite);

    let html="";

    html+=`
    <h2 style="text-align:center;color:#0d47a1;">
    📅 Fecha límite
    </h2>
    `;

    html+=`
    <div class="fecha">

    ${formatearFecha(fechaLimite)}

    </div>
    `;

   if(dias>0){

    html+=`

    <div class="ok">

        ✅ Su declaración aún no está vencida.

    </div>

    <br>

    <div style="font-size:22px;text-align:center;color:${colorDias(dias)};">

        Faltan <b>${dias}</b> días para el vencimiento.

    </div>

    <div class="sancion">

        <h3>⚠ Si no presenta la declaración a tiempo</h3>

        <p>

        La sanción mínima vigente es de:

        </p>

        <div class="valor">

        $ ${SANCION_MINIMA.toLocaleString("es-CO")}

        </div>

        <small>

        Este valor corresponde únicamente a la sanción mínima establecida por la DIAN.

        Si la sanción calculada según el Estatuto Tributario resulta mayor, deberá pagarse el valor superior.

        </small>

    </div>

    `;

}

    else if(dias===0){

        html+=`

        <div class="alerta">

        ⚠ Hoy es el último día para presentar la declaración.

        </div>

        `;

    }

    else{

        const vencidos=Math.abs(dias);

        html+=`

        <div class="error">

        ❌ La declaración está vencida.

        </div>

        <br>

        <div style="font-size:20px;text-align:center;">

        Han transcurrido

        <b>${vencidos}</b>

        días desde el vencimiento.

        </div>

        <div class="sancion">

            <h3>

            Sanción mínima aproximada

            </h3>

            <div class="valor">

            $

            ${SANCION_MINIMA.toLocaleString("es-CO")}

            </div>

            <small>

            Este valor corresponde únicamente a la sanción mínima.

            Dependiendo del caso particular, la DIAN puede liquidar

            una sanción superior conforme al Estatuto Tributario.

            </small>

        </div>

        `;

    }

    resultado.innerHTML=html;
html += `

<div style="text-align:center;margin-top:30px;">
<div class="ayuda">
    <h3>📞 ¿Necesita ayuda con su Declaración de Renta?</h3>

    <p>
        Si tiene dudas sobre si debe declarar, cómo elaborar su declaración
        o necesita asesoría personalizada, puedo ayudarle.
    </p>

    <a
        href="https://wa.me/573014915485?text=Hola,%20necesito%20asesoría%20sobre%20mi%20Declaración%20de%20Renta."
        target="_blank"
        class="btnWhatsapp">

        💬 Solicitar asesoría por WhatsApp

    </a>
</div>
<button
onclick="window.location.href='calcular.html'"
style="
background:#2e7d32;
color:white;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
">

🧮 ¿Debo declarar renta?

</button>

</div>

`;

resultado.innerHTML = html;

}

document
.getElementById("consultarBtn")
.addEventListener("click",consultar);

document
.getElementById("limpiarBtn")
.addEventListener("click",()=>{

document.getElementById("digitos").value="";

document.getElementById("resultado").style.display="none";

document.getElementById("digitos").focus();

});

document
.getElementById("digitos")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){

consultar();

}

});
